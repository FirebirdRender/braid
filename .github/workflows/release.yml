name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          cache: true

      - name: Verify version matches tag
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | cut -d'"' -f2)
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          TAG_VERSION_NO_V="${TAG_VERSION#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION_NO_V" ]; then
            echo "ERROR: Tag $TAG_VERSION does not match Cargo.toml $CARGO_VERSION"
            exit 1
          fi
          echo "Version match: $TAG_VERSION == $CARGO_VERSION"

      - name: Cargo check
        run: cargo check

      - name: Cargo test
        run: cargo test

      - name: Cargo clippy
        run: cargo clippy -- -D warnings

      - name: Cargo fmt
        run: cargo fmt --check

  build:
    needs: quality
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: braid-x86_64-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: braid-aarch64-linux-gnu
            deps: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            artifact_name: braid-armv7-linux-gnueabihf
            deps: gcc-arm-linux-gnueabihf
            linker: arm-linux-gnueabihf-gcc

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          cache: true

      - name: Install cross-compilation deps
        if: matrix.deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ${{ matrix.deps }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc

      - name: Create release archive
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          mkdir -p release-artifacts
          cp "target/${{ matrix.target }}/release/braid" "release-artifacts/${{ matrix.artifact_name }}"
          cd release-artifacts
          tar czf "${{ matrix.artifact_name }}.tar.gz" "${{ matrix.artifact_name }}"
          # Compute checksums
          sha256sum "${{ matrix.artifact_name }}.tar.gz" > "${{ matrix.artifact_name }}.tar.gz.sha256"
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release-artifacts/

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Prepare release assets
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          mkdir -p final-assets
          find release-artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" \) -exec cp {} final-assets/ \;
          ls -la final-assets/

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION_NO_V="${VERSION#v}"
          awk "/^## \\[$VERSION_NO_V\\]/{flag=1; next} /^## \\[/{flag=0} flag" CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "# $VERSION" > release-notes.md
          fi
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body_path: release-notes.md
          files: final-assets/*
          draft: false
          prerelease: false